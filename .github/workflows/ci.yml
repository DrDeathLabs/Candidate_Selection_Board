name: CI

on:
  push:
    branches: [main, develop]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/backend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.0.0
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" ruff pip-audit
      - name: Lint (ruff check)
        run: ruff check app/
      - name: Format check (ruff format)
        run: ruff format --check app/
      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          DEV_AUTH_BYPASS: "true"
          DATABASE_URL: "sqlite:///./test.db"
          REDIS_HOST: "localhost"
          REDIS_PORT: "6379"
      - name: Dependency audit
        run: pip-audit

  frontend-typecheck-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: "22"
      - name: Install dependencies
        run: npm ci
      - name: TypeScript type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Dependency audit
        run: npm audit --audit-level=high

  docker-build-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - name: Build backend image
        run: docker build -t sb-backend:ci services/backend
      - name: Build frontend image
        run: docker build -t sb-frontend:ci services/frontend
      - name: Build OCR image
        run: docker build -t sb-ocr:ci services/ocr

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
        with:
          fetch-depth: 0
      - name: Scan for secrets (TruffleHog)
        uses: trufflesecurity/trufflehog@0f58ae7c5036094a1e3e750d18772af92821b503 # v3.90.5
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.0
      - name: Generate CycloneDX SBOM
        run: bash scripts/generate-sbom.sh
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: sbom
          path: sbom/*.cdx.json
      - name: Attach SBOM to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            sbom/selection-board.cdx.json
            sbom/thirdparty-images.txt
