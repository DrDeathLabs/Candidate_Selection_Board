x-backend-env: &backend-env
  ENVIRONMENT: ${ENVIRONMENT:-local}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  POSTGRES_HOST: ${POSTGRES_HOST:-database}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-selection_board}
  POSTGRES_USER: ${POSTGRES_USER:-selection_board}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-http://object-storage:9000}
  S3_REGION: ${S3_REGION:-us-east-1}
  MINIO_BUCKET: ${MINIO_BUCKET:-selection-board}
  MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
  MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
  PARSER_SERVICE_URL: ${PARSER_SERVICE_URL:-http://parser:8010}
  VIRUS_SCANNER_HOST: ${VIRUS_SCANNER_HOST:-virus-scanner}
  VIRUS_SCANNER_PORT: ${VIRUS_SCANNER_PORT:-3310}
  OPENSEARCH_URL: ${OPENSEARCH_URL:-http://search:9200}
  OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-https://login.example.gov}
  OIDC_AUDIENCE: ${OIDC_AUDIENCE:-selection-board}
  OIDC_JWKS_URL: ${OIDC_JWKS_URL:-https://login.example.gov/.well-known/jwks.json}
  AI_GATEWAY_URL: ${AI_GATEWAY_URL:-http://ai-gateway:8020}
  AI_DEFAULT_PROVIDER: ${AI_DEFAULT_PROVIDER:-ollama}
  AI_ALLOWED_MODELS: ${AI_ALLOWED_MODELS:-gpt-oss:120b-cloud,gpt-4.1,claude-sonnet,gemini-2.5-pro}
  AI_GATEWAY_API_KEY: ${AI_GATEWAY_API_KEY:-change-me}
  TOTP_ENCRYPTION_KEY: ${TOTP_ENCRYPTION_KEY:-u8Jz_cKvq0ndhO6uSbCRKbLnHtfYKoAVIubPzIeU0Pg=}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://127.0.0.1:8610,http://localhost:8610,http://127.0.0.1:8611,http://localhost:8611}
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/0
  CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/1
  DEV_AUTH_BYPASS: ${DEV_AUTH_BYPASS:-true}

x-security-opts: &security-opts
  security_opt:
    - no-new-privileges:true

x-backend-image: &backend-image ghcr.io/drdeathlabs/candidate-selection-board-backend:${IMAGE_TAG:-latest}

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      api:
        condition: service_started
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${APP_HTTP_PORT:-8610}:8080"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"

  frontend:
    image: ghcr.io/drdeathlabs/candidate-selection-board-frontend:${IMAGE_TAG:-latest}
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${FRONTEND_PORT:-8611}:3000"
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  api:
    image: *backend-image
    environment:
      <<: *backend-env
      SERVICE_NAME: api
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8612}:8000"
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head && exec uvicorn app.main:app --host 0.0.0.0 --port 8000",
      ]
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      object-storage:
        condition: service_started
      search:
        condition: service_started
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  worker:
    image: *backend-image
    environment:
      <<: *backend-env
      SERVICE_NAME: worker
    user: "65534:65534"
    command: ["celery", "-A", "app.workers.celery_app:celery_app", "worker", "--loglevel=INFO"]
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      disable: true
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "2.0"

  parser:
    image: *backend-image
    environment:
      <<: *backend-env
      SERVICE_NAME: parser
    command: ["uvicorn", "app.parser.main:app", "--host", "0.0.0.0", "--port", "8010"]
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  ai-gateway:
    image: *backend-image
    environment:
      <<: *backend-env
      SERVICE_NAME: ai-gateway
    command: ["uvicorn", "app.gateway.main:app", "--host", "0.0.0.0", "--port", "8020"]
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  export-service:
    image: *backend-image
    environment:
      <<: *backend-env
      SERVICE_NAME: export-service
    command: ["uvicorn", "app.export.main:app", "--host", "0.0.0.0", "--port", "8030"]
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8030/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  audit-service:
    image: *backend-image
    environment:
      <<: *backend-env
      SERVICE_NAME: audit-service
    command: ["uvicorn", "app.audit.main:app", "--host", "0.0.0.0", "--port", "8040"]
    depends_on:
      database:
        condition: service_healthy
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8040/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  ocr:
    image: ghcr.io/drdeathlabs/candidate-selection-board-ocr:${IMAGE_TAG:-latest}
    environment:
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8050"]
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8050/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-selection_board}
      POSTGRES_USER: ${POSTGRES_USER:-selection_board}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-selection_board} -d ${POSTGRES_DB:-selection_board}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    <<: *security-opts
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  redis:
    image: redis:7-alpine
    entrypoint: ["sh", "-c"]
    command:
      - 'if [ -n "$REDIS_PASSWORD" ]; then exec redis-server --requirepass "$REDIS_PASSWORD"; else exec redis-server; fi'
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  object-storage:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change-me}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${MINIO_API_PORT:-8613}:9000"
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${MINIO_CONSOLE_PORT:-8614}:9001"
    volumes:
      - minio-data:/data
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

  search:
    image: opensearchproject/opensearch:2.17.1
    environment:
      discovery.type: single-node
      plugins.security.disabled: "${OPENSEARCH_SECURITY_DISABLED:-true}"
      OPENSEARCH_JAVA_OPTS: -Xms512m -Xmx512m
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-ChangeMeSearch!8614}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"

  virus-scanner:
    image: clamav/clamav:1.4
    restart: unless-stopped
    <<: *security-opts
    healthcheck:
      test: ["CMD", "clamdscan", "--ping", "3"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 300s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"

volumes:
  postgres-data:
  minio-data:
  opensearch-data:
